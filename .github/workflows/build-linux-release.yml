name: Build Linux Release Asset

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to attach assets to"
        required: true
        default: "v4.4.2"

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system libraries for Qt
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 \
            libgl1 \
            libglvnd0 \
            libglib2.0-0 \
            libopengl0 \
            libx11-6 \
            libxcb1 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-xinerama0 \
            libxext6 \
            libxkbcommon-x11-0 \
            libxrender1

      - name: Install Python build dependencies
        run: python -m pip install -r build/requirements-build.txt

      - name: Build Linux packages
        run: bash ./build/build_unix.sh

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-release-assets
          path: |
            release/SHTUCodeProxy-${{ github.event.inputs.tag }}-linux-x86_64-python-launcher.tar.xz
            release/SHTUCodeProxy-${{ github.event.inputs.tag }}-linux-x86_64-headless-cli.zip
            release/SHTUCodeProxy-${{ github.event.inputs.tag }}-linux-x86_64
            release/shtucodeproxyctl-${{ github.event.inputs.tag }}-linux-x86_64

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag }}
          files: |
            release/SHTUCodeProxy-${{ github.event.inputs.tag }}-linux-x86_64-python-launcher.tar.xz
            release/SHTUCodeProxy-${{ github.event.inputs.tag }}-linux-x86_64-headless-cli.zip
            release/SHTUCodeProxy-${{ github.event.inputs.tag }}-linux-x86_64
            release/shtucodeproxyctl-${{ github.event.inputs.tag }}-linux-x86_64
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
